name: Notion Obsidian Digest

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build digest from Notion search
        env:
          NOTION_API_TOKEN: ${{ secrets.NOTION_API_TOKEN }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path
          from urllib.request import Request, urlopen

          token = os.environ.get("NOTION_API_TOKEN", "").strip()
          if not token:
              raise SystemExit("Missing NOTION_API_TOKEN secret")

          req = Request(
              "https://api.notion.com/v1/search",
              data=json.dumps({"page_size": 8, "sort": {"direction": "descending", "timestamp": "last_edited_time"}}).encode("utf-8"),
              headers={
                  "Authorization": f"Bearer {token}",
                  "Content-Type": "application/json",
                  "Notion-Version": "2022-06-28",
              },
              method="POST",
          )
          with urlopen(req, timeout=30) as resp:
              payload = json.loads(resp.read().decode("utf-8"))

          results = payload.get("results", [])
          now = datetime.now(timezone.utc)
          date_key = now.strftime("%Y%m%d")
          file_path = Path("00_Inbox") / f"Notion_Digest_{date_key}.md"
          file_path.parent.mkdir(parents=True, exist_ok=True)

          lines = [
              "---",
              "type: digest",
              "source: notion",
              "status: seedling",
              f"generated_at_utc: {now.isoformat()}",
              "---",
              "",
              "# Notion Daily Digest",
              "",
              "최근 수정된 Notion 문서 요약:",
              "",
          ]

          if not results:
              lines.append("- (검색 결과 없음)")
          else:
              for item in results[:5]:
                  obj = item.get("object", "")
                  item_id = item.get("id", "")
                  url = item.get("url", "")
                  edited = item.get("last_edited_time", "")
                  title = ""

                  if obj == "page":
                      for prop in item.get("properties", {}).values():
                          if prop.get("type") == "title":
                              texts = prop.get("title", [])
                              title = "".join(t.get("plain_text", "") for t in texts).strip()
                              if title:
                                  break
                  elif obj == "database":
                      texts = item.get("title", [])
                      title = "".join(t.get("plain_text", "") for t in texts).strip()

                  if not title:
                      title = f"{obj}:{item_id[:8]}"

                  lines.append(f"- [{title}]({url})  \n  - type: `{obj}` / edited: `{edited}`")

          file_path.write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Commit and push
        run: |
          set -euo pipefail
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add "00_Inbox"
          git commit -m "Inbox: Notion daily digest $(date +%Y%m%d)" || exit 0
          git push
