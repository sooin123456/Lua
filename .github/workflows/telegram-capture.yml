name: Telegram Inbox Capture

on:
  repository_dispatch:
    types: [telegram-message]

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create inbox note
        env:
          MESSAGE_TEXT: ${{ github.event.client_payload.text }}
        run: |
          set -euo pipefail
          mkdir -p "00_Inbox"
          DATE="$(date +%Y%m%d_%H%M)"
          FILE="00_Inbox/Telegram_Capture_${DATE}.md"

          {
            echo "---"
            echo "type: idea"
            echo "source: telegram"
            echo "status: seedling"
            echo "---"
            echo
            echo "${MESSAGE_TEXT:-}"
          } >> "$FILE"

      - name: Sync inbox queue to master dashboard
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          root = Path(".")
          dashboard = root / "01_Command Center" / "Master Dashboard.md"
          inbox_dir = root / "00_Inbox"

          start_marker = "<!-- AUTO-INBOX-START -->"
          end_marker = "<!-- AUTO-INBOX-END -->"

          if not dashboard.exists():
              raise SystemExit("Master Dashboard.md not found")

          files = sorted(inbox_dir.glob("Telegram_Capture_*.md"), key=lambda p: p.stat().st_mtime, reverse=True)[:3]
          lines = [start_marker]
          if files:
              for p in files:
                  stem = p.stem
                  lines.append(f"- [ ] [[00_Inbox/{stem}|{stem}]] - `source: telegram`")
          else:
              lines.append("- [ ] (telegram 캡처 대기중)")
          lines.append(end_marker)
          replacement = "\n".join(lines)

          content = dashboard.read_text(encoding="utf-8")
          if start_marker in content and end_marker in content:
              start = content.index(start_marker)
              end = content.index(end_marker) + len(end_marker)
              updated = content[:start] + replacement + content[end:]
          else:
              block = "\n## 📥 Inbox 처리 큐\n\n" + replacement + "\n"
              updated = content.rstrip() + "\n\n---\n" + block + "\n"

          dashboard.write_text(updated, encoding="utf-8")
          PY

      - name: Commit and push
        run: |
          set -euo pipefail
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add "00_Inbox" "01_Command Center/Master Dashboard.md"
          git commit -m "Inbox: Telegram capture $(date +%Y%m%d_%H%M)" || exit 0
          git push
